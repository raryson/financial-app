<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FinanceApp — Sem conexão</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #f9fafb;
        color: #111827;
        padding: 2rem;
        text-align: center;
        gap: 1rem;
      }
      svg { color: #9ca3af; }
      h1 { font-size: 1.25rem; font-weight: 600; }
      p { font-size: 0.875rem; color: #6b7280; max-width: 24rem; line-height: 1.5; }
      button {
        margin-top: 0.5rem;
        padding: 0.625rem 1.5rem;
        background: #820ad1;
        color: #fff;
        border: none;
        border-radius: 0.5rem;
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
      }
      button:hover { background: #6d09af; }
    </style>
  </head>
  <body>
    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>
    <h1>Você está offline</h1>
    <p>
      Sem conexão com a internet. Seus dados salvos no navegador continuam
      disponíveis — volte à página principal para acessá-los.
    </p>
    <button onclick="location.href='/'">Ir para o app</button>
  </body>
</html>
